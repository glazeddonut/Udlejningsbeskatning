<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Udlejningsbeskatning</title>
    <script>
      // Pre-paint: sæt tema før første render for at undgå flash.
      try {
        var t = localStorage.getItem('theme')
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark')
      } catch (e) { /* privat browsing o.l. */ }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
